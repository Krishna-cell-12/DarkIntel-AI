# ═══════════════════════════════════════════════
# DarkIntel-AI — Render Blueprint (render.yaml)
# Deploys both backend (FastAPI) and frontend (Vite/React)
# ═══════════════════════════════════════════════


services:
  # ── Backend: FastAPI Python Web Service ──────
  - type: web
    name: darkintel-backend
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: GROQ_API_KEY
        sync: false          # set manually in Render dashboard
    healthCheckPath: /api/health


  # ── Frontend: Vite Static Site ──────────────
  - type: static_site
    name: darkintel-frontend
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
    routes:
      - type: rewrite
        source: /*
