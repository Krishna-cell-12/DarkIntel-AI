<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DarkIntel 3D Scene</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0f; }
    canvas { width: 100% !important; height: 100% !important; display: block; }
  </style>
</head>
<body>
  <script type="module">
    import { Application } from 'https://unpkg.com/@splinetool/runtime@latest/build/runtime.js';

    const canvas = document.createElement('canvas');
    canvas.id = 'canvas3d';
    document.body.appendChild(canvas);

    const app = new Application(canvas);
    await app.load('https://prod.spline.design/9Gn1j7uSxAqhQhxm/scene.splinecode');

    // Scene loaded — tell the parent React app
    window.parent.postMessage('spline-loaded', '*');

    // Detect clicks on Spline objects — the "Analyze" button is named "Return"
    // This fires BEFORE Spline's built-in "Open URL" action
    app.addEventListener('mouseDown', (e) => {
      const name = (e.target?.name || '').toLowerCase();
      if (name.includes('return') || name.includes('analy')) {
        window.parent.postMessage('spline-navigate', '*');
      }
    });
  </script>
</body>
</html>
